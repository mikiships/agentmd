name: "agentmd Context Drift"
description: "Run agentmd drift checks and optionally post a PR comment"
author: "mikiships"

inputs:
  agent:
    description: "Agent context file to check (claude, codex, cursor, copilot)"
    required: false
    default: "claude"
  fail-on-drift:
    description: "Fail the workflow when drift is detected"
    required: false
    default: "true"
  comment:
    description: "Post or update a PR comment with the markdown drift report"
    required: false
    default: "true"
  python-version:
    description: "Python version used to run agentmd"
    required: false
    default: "3.11"

outputs:
  drift-exit-code:
    description: "Exit code returned by agentmd drift"
    value: ${{ steps.drift.outputs.exit_code }}
  has-drift:
    description: "Whether drift was detected (true/false)"
    value: ${{ steps.drift.outputs.has_drift }}
  report-path:
    description: "Path to the generated markdown report file"
    value: ${{ steps.drift.outputs.report_path }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install agentmd
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install agentmd-gen

    - name: Run drift check
      id: drift
      shell: bash
      run: |
        set +e
        report_file="${RUNNER_TEMP}/agentmd-drift-comment.md"
        agentmd drift --agent "${{ inputs.agent }}" --format markdown > "${report_file}" 2>&1
        exit_code=$?
        set -e

        if [ "${exit_code}" -eq 0 ]; then
          has_drift="false"
        else
          has_drift="true"
        fi

        echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
        echo "has_drift=${has_drift}" >> "${GITHUB_OUTPUT}"
        echo "report_path=${report_file}" >> "${GITHUB_OUTPUT}"

    - name: Find existing drift comment
      id: find-comment
      if: ${{ inputs.comment == 'true' && github.event_name == 'pull_request' }}
      uses: peter-evans/find-comment@v3
      with:
        issue-number: ${{ github.event.pull_request.number }}
        comment-author: "github-actions[bot]"
        body-includes: "## 🔍 agentmd Context Drift Report"

    - name: Update existing PR comment
      if: ${{ inputs.comment == 'true' && github.event_name == 'pull_request' && steps.find-comment.outputs.comment-id != '' }}
      uses: peter-evans/create-or-update-comment@v4
      with:
        comment-id: ${{ steps.find-comment.outputs.comment-id }}
        body-path: ${{ steps.drift.outputs.report_path }}
        edit-mode: replace

    - name: Create PR comment
      if: ${{ inputs.comment == 'true' && github.event_name == 'pull_request' && steps.find-comment.outputs.comment-id == '' }}
      uses: peter-evans/create-or-update-comment@v4
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body-path: ${{ steps.drift.outputs.report_path }}

    - name: Fail when drift is detected
      if: ${{ inputs.fail-on-drift == 'true' && steps.drift.outputs.exit_code != '0' }}
      shell: bash
      run: |
        echo "agentmd detected context drift"
        exit 1
